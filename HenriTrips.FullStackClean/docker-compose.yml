services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: henritrips-db
    restart: unless-stopped

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DB_PASSWORD}

    volumes:
      - sql_data:/var/opt/mssql


  api:
    build:
      context: .
      dockerfile: src/HenriTrips.Api/Dockerfile

    container_name: henritrips-api
    restart: unless-stopped

    ports:
      - "5000:8080"

    depends_on:
      - sqlserver

    environment:
      ASPNETCORE_ENVIRONMENT: "Production"

      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=${DB_NAME};User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;"

      Jwt__SecretKey: ${JWT_SECRET}
      Jwt__Issuer: "HenriTrips"
      Jwt__Audience: "HenriTripsUsers"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  sql_data: